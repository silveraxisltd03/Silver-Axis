[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit"

# SPA fallback so client-side routes (/services, /projects, /contact) work on reload
[[redirects]]
  from = "/portfolio"
  to = "/projects"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
